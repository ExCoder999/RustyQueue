[database]
url = "postgres://user:pass@localhost:5432/rustyqueue"
max_connections = 20

[queue]
default_lease_seconds = 60
poll_interval_ms = 500
max_command_timeout_seconds = 300

[worker]
queues = ["default"]
num_workers_per_queue = 4

[server]
host = "0.0.0.0"
port = 8080

[observability]
otel_endpoint = "http://localhost:4317"
